[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./broadcast" }]

# Invariant runs bounded for a brisk CI suite while still exercising thousands of
# register/transfer sequences. For a deep local run: `forge test --match-path
# 'test/*Invariant*' --invariant-runs 256 --invariant-depth 256`.
[invariant]
runs = 64
depth = 64
fail_on_revert = true

[rpc_endpoints]
shannon = "${SHANNON_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
